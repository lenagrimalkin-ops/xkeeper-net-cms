releasePrefix: "-"

deployments:
  xkeeper-net-cms:
    podLabels:
      app: xkeeper-net-cms
    replicas: 1
    extraSelectorLabels:
      app: xkeeper-net-cms
    extraImagePullSecrets:
      - name: nexus-auth-xpro
    serviceAccountName: github-deployer
    containers:
      - name: xkeeper-net-cms
        image: dockerhub.nexus.stage.x-keeper.net/xkeeper-net-cms
        imageTag: "{{ .Values.image_tag }}"
        imagePullPolicy: Always
        ports:
          - containerPort: 1337
        # На Phase A — SQLite в эфемерном томе. Контент пропадает при рестарте пода.
        # На Phase B — переключиться на Postgres (через DATABASE_URL из k8s Secret).
        env:
          - name: NODE_ENV
            value: "production"
          - name: HOST
            value: "0.0.0.0"
          - name: PORT
            value: "1337"
          - name: DATABASE_CLIENT
            value: "sqlite"
          - name: DATABASE_FILENAME
            value: ".tmp/data.db"
          # TODO: вынести в k8s Secret перед первым демо маркетингу
          - name: APP_KEYS
            value: "phaseA-placeholder1,phaseA-placeholder2"
          - name: API_TOKEN_SALT
            value: "phaseA-placeholder"
          - name: ADMIN_JWT_SECRET
            value: "phaseA-placeholder"
          - name: TRANSFER_TOKEN_SALT
            value: "phaseA-placeholder"
          - name: JWT_SECRET
            value: "phaseA-placeholder"
        resources:
          requests:
            cpu: 250m
            memory: 768Mi
        livenessProbe:
          exec:
            command:
              - sh
              - -c
              - wget --no-verbose --tries=1 --spider http://127.0.0.1:1337/_health
          failureThreshold: 3
          initialDelaySeconds: 60
        readinessProbe:
          exec:
            command:
              - sh
              - -c
              - wget --no-verbose --tries=1 --spider http://127.0.0.1:1337/_health
          failureThreshold: 3
          initialDelaySeconds: 30

ingresses:
  xkeeper-net-cms:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-api"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    ingressClassName: nginx
    hosts:
      - hostname: "cms.xkeeper-net.{{ .Values.hostname }}x-keeper.net"
        paths:
          - path: "/"
            pathType: Prefix
            serviceName: xkeeper-net-cms
            servicePort: 80
    extraTls:
      - hosts:
          - cms.xkeeper-net.{{ .Values.hostname }}x-keeper.net
        secretName: cms.xkeeper-net.{{ .Values.hostname }}x-keeper.net-tls

services:
  xkeeper-net-cms:
    type: ClusterIP
    extraSelectorLabels:
      app: xkeeper-net-cms
    ports:
      - name: http
        protocol: TCP
        port: 80
        targetPort: 1337
